name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
    paths-ignore:
      - "public/assets/certs/**"
      - "public/assets/projects/**"
      - "public/resume/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          VITE_ADMIN_PASSWORD: ${{ secrets.ADMIN_SECRET }}
        run: npm run build

      - name: Deploy to GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run deploy
