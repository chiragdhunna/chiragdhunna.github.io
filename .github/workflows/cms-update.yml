name: CMS Update

on:
  repository_dispatch:
    types:
      - add-project
      - update-project
      - delete-project
      - add-cert
      - update-cert
      - delete-cert

permissions:
  contents: write
  actions: write

jobs:
  update-cms:
    runs-on: ubuntu-latest
    steps:
      - name: Validate admin token
        env:
          ADMIN_TOKEN: ${{ github.event.client_payload.admin_token }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          python3 - <<'PY'
          import base64
          import hashlib
          import hmac
          import json
          import os
          import sys
          import time

          token = os.environ.get("ADMIN_TOKEN", "")
          secret = os.environ.get("ADMIN_SECRET", "")

          if not token or not secret:
              sys.exit("Missing admin token or secret")

          def decode(value: str) -> bytes:
              padding = "=" * (-len(value) % 4)
              return base64.urlsafe_b64decode(value + padding)

          try:
              header_b64, payload_b64, signature_b64 = token.split(".")
              signing_input = f"{header_b64}.{payload_b64}".encode("utf-8")
              expected_signature = hmac.new(
                  secret.encode("utf-8"), signing_input, hashlib.sha256
              ).digest()
              actual_signature = decode(signature_b64)

              if not hmac.compare_digest(expected_signature, actual_signature):
                  sys.exit("Invalid admin token")

              payload = json.loads(decode(payload_b64))
              if int(payload.get("exp", 0)) <= int(time.time()):
                  sys.exit("Admin token expired")
          except Exception as exc:
              sys.exit(f"Invalid admin token: {exc}")
          PY

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update project records
        if: ${{ contains(fromJSON('["add-project","update-project","delete-project"]'), github.event.action) }}
        env:
          EVENT_TYPE: ${{ github.event.action }}
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import re
          import uuid
          from datetime import datetime, timezone
          from pathlib import Path

          event_type = os.environ["EVENT_TYPE"]
          payload = json.loads(os.environ["PAYLOAD"])
          data_path = Path("public/data/projects.json")
          assets_dir = Path("public/assets/projects")
          assets_dir.mkdir(parents=True, exist_ok=True)

          def sanitize_slug(value: str) -> str:
              slug = re.sub(r"[^a-z0-9]+", "-", value.lower())
              slug = re.sub(r"-+", "-", slug).strip("-")
              if not slug:
                  raise SystemExit("Invalid project slug")
              return slug

          def decode_base64(value: str) -> bytes:
              if "," in value:
                  value = value.split(",", 1)[1]
              return base64.b64decode(value)

          projects = []
          if data_path.exists():
              projects = json.loads(data_path.read_text(encoding="utf-8"))

          slug = sanitize_slug(str(payload.get("slug") or payload.get("name") or ""))
          identifier = str(payload.get("id") or slug)
          existing_index = next(
              (
                  index
                  for index, project in enumerate(projects)
                  if project.get("id") == identifier or project.get("slug") == slug
              ),
              None,
          )

          if event_type == "delete-project":
              projects = [
                  project
                  for project in projects
                  if project.get("id") != identifier and project.get("slug") != slug
              ]
          else:
              image_base64 = payload.get("imageBase64")
              if image_base64:
                  (assets_dir / f"{slug}.jpg").write_bytes(decode_base64(image_base64))

              created_at = payload.get("createdAt")
              if not created_at and existing_index is not None:
                  created_at = projects[existing_index].get("createdAt")
              if not created_at:
                  created_at = datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")

              entry = {
                  "id": payload.get("id") or (projects[existing_index].get("id") if existing_index is not None else str(uuid.uuid4())),
                  "slug": slug,
                  "name": payload.get("name", ""),
                  "description": payload.get("description", ""),
                  "imageUrl": f"/assets/projects/{slug}.jpg",
                  "projectUrl": payload.get("projectUrl", ""),
                  "demoUrl": payload.get("demoUrl"),
                  "tags": payload.get("tags") or [],
                  "createdAt": created_at,
              }

              if existing_index is None:
                  projects.append(entry)
              else:
                  projects[existing_index] = entry

          data_path.parent.mkdir(parents=True, exist_ok=True)
          data_path.write_text(json.dumps(projects, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Update certification records
        if: ${{ contains(fromJSON('["add-cert","update-cert","delete-cert"]'), github.event.action) }}
        env:
          EVENT_TYPE: ${{ github.event.action }}
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import re
          import uuid
          from datetime import datetime, timezone
          from pathlib import Path

          event_type = os.environ["EVENT_TYPE"]
          payload = json.loads(os.environ["PAYLOAD"])
          data_path = Path("public/data/certs.json")
          assets_dir = Path("public/assets/certs")
          assets_dir.mkdir(parents=True, exist_ok=True)

          def sanitize_slug(value: str) -> str:
              slug = re.sub(r"[^a-z0-9]+", "-", value.lower())
              slug = re.sub(r"-+", "-", slug).strip("-")
              if not slug:
                  raise SystemExit("Invalid cert slug")
              return slug

          def decode_base64(value: str) -> bytes:
              if "," in value:
                  value = value.split(",", 1)[1]
              return base64.b64decode(value)

          certs = []
          if data_path.exists():
              certs = json.loads(data_path.read_text(encoding="utf-8"))

          slug = sanitize_slug(str(payload.get("slug") or payload.get("name") or ""))
          identifier = str(payload.get("id") or slug)
          existing_index = next(
              (
                  index
                  for index, cert in enumerate(certs)
                  if cert.get("id") == identifier or cert.get("slug") == slug
              ),
              None,
          )

          if event_type == "delete-cert":
              certs = [
                  cert
                  for cert in certs
                  if cert.get("id") != identifier and cert.get("slug") != slug
              ]
          else:
              image_base64 = payload.get("imageBase64")
              if image_base64:
                  (assets_dir / f"{slug}.jpg").write_bytes(decode_base64(image_base64))

              pdf_base64 = payload.get("pdfBase64")
              if pdf_base64:
                  (assets_dir / f"{slug}.pdf").write_bytes(decode_base64(pdf_base64))

              created_at = payload.get("createdAt")
              if not created_at and existing_index is not None:
                  created_at = certs[existing_index].get("createdAt")
              if not created_at:
                  created_at = datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")

              entry = {
                  "id": payload.get("id") or (certs[existing_index].get("id") if existing_index is not None else str(uuid.uuid4())),
                  "slug": slug,
                  "name": payload.get("name", ""),
                  "issuer": payload.get("issuer", ""),
                  "issueDate": payload.get("issueDate", ""),
                  "imageUrl": f"/assets/certs/{slug}.jpg",
                  "pdfUrl": f"/assets/certs/{slug}.pdf" if pdf_base64 else (certs[existing_index].get("pdfUrl") if existing_index is not None else None),
                  "credentialUrl": payload.get("credentialUrl"),
                  "createdAt": created_at,
              }

              if existing_index is None:
                  certs.append(entry)
              else:
                  certs[existing_index] = entry

          data_path.parent.mkdir(parents=True, exist_ok=True)
          data_path.write_text(json.dumps(certs, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Commit and push changes
        env:
          EVENT_TYPE: ${{ github.event.action }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data public/assets

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "cms: ${EVENT_TYPE}"
            git push origin master
          fi

      - name: Trigger deploy workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref master
