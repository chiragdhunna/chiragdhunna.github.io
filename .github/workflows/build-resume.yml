name: Sync Resume from Overleaf

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone Overleaf project via Git
        run: |
          git clone https://git@git.overleaf.com/${{ secrets.OVERLEAF_PROJECT_ID }} overleaf-project \
            --config credential.helper='!f(){ echo "password=${{ secrets.OVERLEAF_GIT_TOKEN }}"; };f'

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: overleaf-project

      - name: Copy PDF to public folder
        run: |
          mkdir -p public
          cp overleaf-project/main.pdf public/CHIRAG_DHUNNA.pdf

      - name: Commit and push PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-sync resume PDF from Overleaf"
          file_pattern: public/CHIRAG_DHUNNA.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
